<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Hệ thống quản lý sinh viên</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="header-bar">
            <h2>Quản lý sinh viên</h2>
            <div class="list-actions" id="list-actions-bar">
                <button class="btn btn-outline">Filter</button>
                <button class="btn btn-primary" id="btn-add-student">+ Thêm sinh viên</button>
            </div>
        </div>

        <div class="content">
            <div id="list-view" class="view active">
                <div id="student-list">
                    </div>
                <div class="pagination-info" id="pagination-text">
                    Showing 0 entries
                </div>
            </div>

            <div id="form-view" class="view">
                <h3 class="form-title">Đăng ký/Sửa thông tin Sinh viên</h3>
                <form id="student-form">
                    <input type="hidden" id="edit-index" value="">
                    
                    <div class="form-grid">
                        <div class="form-group">
                            <label>Họ và tên</label>
                            <input type="text" name="fullname" id="fullname">
                        </div>
                        <div class="form-group">
                            <label>Mã sinh viên</label>
                            <input type="text" name="studentid" id="studentid" placeholder="VD: SV001">
                        </div>
                        <div class="form-group">
                            <label>Email</label>
                            <input type="text" name="email" id="email">
                        </div>
                        <div class="form-group">
                            <label>Số điện thoại</label>
                            <input type="text" name="phone" id="phone">
                        </div>
                        <div class="form-group">
                            <label>Ngành học</label>
                            <select name="major" id="major">
                                <option value="">Chọn ngành</option>
                                <option value="IT">IT</option>
                                <option value="Business">Business</option>
                                <option value="Design">Design</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Giới tính</label>
                            <div class="radio-group">
                                <label><input type="radio" name="gender" value="Nam"> Nam</label>
                                <label><input type="radio" name="gender" value="Nữ"> Nữ</label>
                            </div>
                        </div>
                    </div>
                    
                    <div class="form-buttons">
                        <button type="submit" class="btn btn-primary">Lưu thông tin</button>
                        <button type="button" class="btn btn-secondary" id="btn-cancel">Hủy</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jquery-validation@1.19.5/dist/jquery.validate.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
