<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Quản Lý & Lọc Điểm Sinh Viên</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h2> Nâng Cấp: Bộ Lọc & Tìm Kiếm</h2>

        <div class="input-form">
            <input type="text" id="txtName" placeholder="Họ tên sinh viên" autofocus>
            <input type="number" id="txtScore" placeholder="Điểm (0-10)" step="0.1">
            <button id="btnAdd">Thêm</button>
        </div>

        <hr>

        <div class="filter-controls">
            <input type="text" id="searchName" placeholder="🔍 Tìm tên sinh viên...">
            
            <select id="filterRank">
                <option value="all">Tất cả xếp loại</option>
                <option value="Giỏi">Giỏi</option>
                <option value="Khá">Khá</option>
                <option value="Trung bình">Trung bình</option>
                <option value="Yếu">Yếu</option>
            </select>
        </div>

        <table>
            <thead>
                <tr>
                    <th>STT</th>
                    <th>Họ tên</th>
                    <th id="sortScore" style="cursor: pointer;">Điểm <span id="sortIcon">↕</span></th>
                    <th>Xếp loại</th>
                    <th>Thao tác</th>
                </tr>
            </thead>
            <tbody id="studentBody">
                </tbody>
        </table>

        <div id="statistics" class="stats-box">
            Tổng số: 0 | Điểm TB: 0.00
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
