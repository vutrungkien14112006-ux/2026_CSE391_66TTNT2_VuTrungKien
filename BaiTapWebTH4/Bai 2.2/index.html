<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Đặt Hàng Nâng Cao</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h2>🛒 Form Đặt Hàng</h2>
        <form id="orderForm">
            <div class="form-group">
                <label>Tên sản phẩm</label>
                <select id="product">
                    <option value="">-- Chọn sản phẩm --</option>
                    <option value="Laptop">Laptop (20.000.000đ)</option>
                    <option value="Smartphone">Smartphone (10.000.000đ)</option>
                    <option value="Keyboard">Bàn phím cơ (2.500.000đ)</option>
                    <option value="Mouse">Chuột Gaming (1.200.000đ)</option>
                </select>
                <small class="error-msg"></small>
            </div>

            <div class="form-group">
                <label>Số lượng (1-99)</label>
                <input type="number" id="quantity" value="1" min="1" max="99">
                <small class="error-msg"></small>
            </div>

            <div class="total-display">
                Tổng cộng: <span id="totalAmount">0đ</span>
            </div>

            <div class="form-group">
                <label>Ngày giao hàng</label>
                <input type="date" id="deliveryDate">
                <small class="error-msg"></small>
            </div>

            <div class="form-group">
                <label>Địa chỉ giao hàng</label>
                <textarea id="address" rows="2" placeholder="Số nhà, tên đường, phường/xã..."></textarea>
                <small class="error-msg"></small>
            </div>

            <div class="form-group">
                <label>Ghi chú (Tối đa 200 ký tự)</label>
                <textarea id="note" rows="3"></textarea>
                <div id="charCount" class="char-counter">0/200</div>
                <small class="error-msg"></small>
            </div>

            <div class="form-group">
                <label>Phương thức thanh toán:</label>
                <div class="radio-group">
                    <input type="radio" name="payment" value="COD" id="cod"> <label for="cod">COD</label>
                    <input type="radio" name="payment" value="Chuyển khoản" id="bank"> <label for="bank">Chuyển khoản</label>
                    <input type="radio" name="payment" value="Ví điện tử" id="wallet"> <label for="wallet">Ví điện tử</label>
                </div>
                <small class="error-msg"></small>
            </div>

            <button type="submit" class="btn-submit">Đặt Hàng Ngay</button>
        </form>
    </div>

    <div id="confirmModal" class="modal">
        <div class="modal-content">
            <h3>🔍 Xác nhận đơn hàng</h3>
            <div id="summaryContent"></div>
            <div class="modal-actions">
                <button id="btnFinalConfirm" class="btn-confirm">Xác nhận</button>
                <button id="btnCancel" class="btn-cancel">Hủy</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
