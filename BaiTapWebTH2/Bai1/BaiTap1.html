<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bài tập Flexbox Form</title>
    <style>

        * {
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: #f9f9f9;
            display: flex;
            justify-content: center;
            padding-top: 50px;
        }

        .form-container {
            width: 700px;
            border: 1px solid #333;
            padding: 30px;
            background-color: #fff;
        }

        .form-title {
            font-weight: bold;
            color: #444;
            margin-bottom: 20px;
            font-size: 1.1rem;
        }
        .form-row {
            display: flex;
            gap: 25px;
            margin-bottom: 15px;
        }

        .form-row input, 
        .form-row textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            outline: none;
            color: #666;
        }

        .two-cols input {
            flex: 1; 
        }

       
        textarea {
            height: 250px;
            resize: none;
        }

        .footer-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
        }

        .btn-send {
            background-color: #82d1f1;
            color: white;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            border-radius: 4px;
            font-size: 0.9rem;
        }

        .btn-send:hover {
            background-color: #66b8d9;
        }

        .note {
            color: #888;
            font-size: 0.9rem;
            font-style: italic;
        }
    </style>
</head>
<body>

    <div class="form-container">
        <div class="form-title">Get in touch with us by filling contact form below</div>
        
        <form>
            <div class="form-row two-cols">
                <input type="text" placeholder="* Enter your full name">
                <input type="email" placeholder="* Enter your email address">
            </div>

            <div class="form-row">
                <input type="text" placeholder="Enter your subject">
            </div>

            <div class="form-row">
                <textarea placeholder="* Your message here..."></textarea>
            </div>

            <div class="footer-row">
                <button type="submit" class="btn-send">Send message</button>
                <span class="note">* Please fill all required form field, thanks!</span>
            </div>
        </form>
    </div>

</body>
</html>
